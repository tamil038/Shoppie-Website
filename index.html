<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopiee | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary),var(--accent));}
    .auth-box{background:#fff;border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:420px;padding:40px;text-align:center;animation:fadeIn .6s ease;}
    .auth-box h1{color:var(--primary);margin-bottom:10px;}
    .tabs{display:flex;justify-content:center;gap:30px;margin-bottom:24px;}
    .tab{cursor:pointer;font-weight:700;color:#666;padding-bottom:6px;border-bottom:3px solid transparent;transition:.3s;}
    .tab.active{color:var(--primary);border-color:var(--primary);}
    .auth-form{display:none;animation:fadeIn .5s ease;}
    .auth-form.active{display:block;}
    .auth-form input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px;}
    .auth-form button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
    .auth-form button:hover{background:var(--accent);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>🛍️ Shopiee</h1>
      <p style="color:#666;">Shop Smart, Live Better</p>
      <div class="tabs">
        <div class="tab active" id="login-tab">Login</div>
        <div class="tab" id="signup-tab">Sign Up</div>
      </div>

      <div id="login-form" class="auth-form active">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button onclick="enterSite()">Login</button>
      </div>

      <div id="signup-form" class="auth-form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button onclick="enterSite()">Sign Up</button>
      </div>
    </div>
  </div>

  <script>
    const loginTab=document.getElementById('login-tab');
    const signupTab=document.getElementById('signup-tab');
    const loginForm=document.getElementById('login-form');
    const signupForm=document.getElementById('signup-form');

    loginTab.onclick=()=>{loginTab.classList.add('active');signupTab.classList.remove('active');loginForm.classList.add('active');signupForm.classList.remove('active');}
    signupTab.onclick=()=>{signupTab.classList.add('active');loginTab.classList.remove('active');signupForm.classList.add('active');loginForm.classList.remove('active');}

    function enterSite(){ window.location.href='home.html'; }
  </script>
</body>
</html>
